server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gmpp_db}
    username: ${SPRING_DATASOURCE_USERNAME:gmpp_user}
    password: ${SPRING_DATASOURCE_PASSWORD:gmpp_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  # Bug 2 fix: PLUS de valeur par défaut (sécurité). Définir JWT_SECRET dans .env avant de lancer.
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.gmpp: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

# Alertes email (Feat 3)
gmpp:
  alert:
    email:
      # Mettre 'true' pour activer l'envoi d'emails quotidien d'alertes J-7/J-3/J-1
      enabled: ${GMPP_ALERT_EMAIL_ENABLED:false}
